name: AFM Release Notes
description: >
  Generate AI release notes using Apple Intelligence (on-device) on a self-hosted macOS runner.
  Returns release_title, release_body, and prev_tag as outputs. Does not create or modify any release.
author: runbot-hq

inputs:
  tag:
    description: 'Tag to generate release notes for (e.g. v1.2.3) — leave blank to auto-resolve to latest git tag'
    required: false
    default: ''
  prev_tag:
    description: Previous tag to compare against (auto-resolved from git tags if omitted)
    required: false
  prompt_extra:
    description: Optional extra instruction appended to the prompt (max 300 chars)
    required: false
  debug:
    description: Set to true to enable verbose logging
    required: false
    default: 'false'

outputs:
  release_title:
    description: AI-generated release title
  release_body:
    description: AI-generated release notes body (Markdown)
  prev_tag:
    description: The previous tag used for comparison

runs:
  using: node20
  main: dist/index.js
