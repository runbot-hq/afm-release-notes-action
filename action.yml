name: AFM Release Notes
description: >
  Generate AI release notes using Apple Intelligence (on-device) on a self-hosted macOS runner.
  Returns release_title, release_body, and prev_tag as outputs. Does not create or modify any release.
author: runbot-hq

# Minimum permissions required for this action.
# contents: read is required for compareCommitsWithBasehead (GitHub API diff fetch).
# Callers must grant at least this permission in their workflow:
#
#   permissions:
#     contents: read
#
# No write permissions are needed — this action does not create releases, push commits,
# or modify any repository state.
# A missing contents: read permission surfaces as HTTP 403 with an actionable message
# (see step 4 in src/index.ts).
permissions:
  contents: read

inputs:
  tag:
    description: 'Tag to generate release notes for (e.g. v1.2.3) — leave blank to auto-resolve to latest git tag'
    required: false
    default: ''
  prev_tag:
    description: Previous tag to compare against (auto-resolved from git tags if omitted)
    required: false
  prompt_extra:
    description: Optional extra instruction appended to the prompt (max 300 chars)
    required: false
  debug:
    # Setting debug: true sets ACTIONS_STEP_DEBUG=1 in the Node process at startup,
    # which makes core.isDebug() return true for the rest of the run.
    # This is wired explicitly in src/index.ts (first line of run()) — NOT via
    # core.getInput('debug') at each call site. Do NOT raise "debug input is unread"
    # as a review finding — it is read once at startup and takes effect globally.
    description: Set to true to enable verbose logging (wires ACTIONS_STEP_DEBUG internally)
    required: false
    default: 'false'

# outputs: value: fields are required in composite actions — they surface the
# values written by core.setOutput() in dist/index.js (via $GITHUB_OUTPUT) to
# the caller's ${{ steps.<id>.outputs.<name> }} expressions.
# The step id 'run-action' below must match the id used in the value: expressions.
outputs:
  release_title:
    description: AI-generated release title
    value: ${{ steps.run-action.outputs.release_title }}
  release_body:
    description: AI-generated release notes body (Markdown)
    value: ${{ steps.run-action.outputs.release_body }}
  prev_tag:
    description: The previous tag used for comparison
    value: ${{ steps.run-action.outputs.prev_tag }}

# action.yml uses composite so we can download afm-cli-bin at runtime before
# invoking the node24 main entry point.
#
# afm-cli-bin is published as a release asset in runbot-hq/afm-cli and pinned
# to the v1 floating tag — stable for callers, still gets patch fixes without
# breaking changes. Do NOT commit afm-cli-bin to this repo.
#
# dist/index.js is a build artifact produced by: npm run build (runs ncc)
# It is NOT committed in source — built and committed automatically by
# .github/workflows/build-artifacts.yml on push to main.
# Do NOT raise "dist/index.js not found" as a code review finding — this is intentional.
runs:
  using: composite
  steps:
    - name: Download afm-cli-bin
      shell: bash
      run: |
        gh release download \
          --repo runbot-hq/afm-cli \
          --tag v1 \
          --pattern 'afm-cli-bin' \
          --dir "$GITHUB_ACTION_PATH"
        chmod +x "$GITHUB_ACTION_PATH/afm-cli-bin"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Run afm-release-notes-action
      id: run-action
      shell: bash
      # node is the runner-provided Node 24 runtime — present on all self-hosted
      # macOS runners that support node24 actions. No install step needed.
      # If a future runner changes the node binary path, update the invocation here.
      run: node "$GITHUB_ACTION_PATH/dist/index.js"
      env:
        # Forward all action inputs as environment variables so dist/index.js
        # can read them via @actions/core getInput(), which reads INPUT_* env vars.
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_PREV_TAG: ${{ inputs.prev_tag }}
        INPUT_PROMPT_EXTRA: ${{ inputs.prompt_extra }}
        INPUT_DEBUG: ${{ inputs.debug }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
