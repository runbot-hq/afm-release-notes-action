name: AFM Release Notes
description: >
  Generate AI release notes using Apple Intelligence (on-device) on a self-hosted macOS runner.
  Returns release_title, release_body, and prev_tag as outputs. Does not create or modify any release.
author: runbot-hq

# Minimum permissions required for this action.
# contents: read is required for compareCommitsWithBasehead (GitHub API diff fetch).
# Callers must grant at least this permission in their workflow:
#
#   permissions:
#     contents: read
#
# No write permissions are needed — this action does not create releases, push commits,
# or modify any repository state.
# A missing contents: read permission surfaces as HTTP 403 with an actionable message
# (see step 4 in src/index.ts).
permissions:
  contents: read

inputs:
  tag:
    description: 'Tag to generate release notes for (e.g. v1.2.3) — leave blank to auto-resolve to latest git tag'
    required: false
    default: ''
  prev_tag:
    description: Previous tag to compare against (auto-resolved from git tags if omitted)
    required: false
  prompt_extra:
    description: Optional extra instruction appended to the prompt (max 300 chars)
    required: false
  debug:
    # Setting debug: true sets ACTIONS_STEP_DEBUG=1 in the Node process at startup,
    # which makes core.isDebug() return true for the rest of the run.
    # This is wired explicitly in src/index.ts (first line of run()) — NOT via
    # core.getInput('debug') at each call site. Do NOT raise "debug input is unread"
    # as a review finding — it is read once at startup and takes effect globally.
    description: Set to true to enable verbose logging (wires ACTIONS_STEP_DEBUG internally)
    required: false
    default: 'false'

# outputs: intentionally has no value: fields.
# value: expressions are only valid in composite actions.
# This is a node24 action — outputs are set via core.setOutput() in dist/index.js
# which writes directly to $GITHUB_OUTPUT. This is correct and intentional.
# Do NOT add value: fields here — they are invalid in node24 actions and will be ignored or error.
outputs:
  release_title:
    description: AI-generated release title
  release_body:
    description: AI-generated release notes body (Markdown)
  prev_tag:
    description: The previous tag used for comparison

# afm-cli-bin is committed to the repo root — sourced from runbot-hq/afm-cli.
# It is updated manually: download the new binary from runbot-hq/afm-cli and
# commit it here. There is no automated cross-repo sync yet (tracked in #30).
# Zero runtime dependencies — no gh, curl, or network calls occur when this
# action runs.
#
# This is intentionally NOT a composite action with a runtime download step.
# That design was tried and reverted: requiring `gh release download` on every
# caller's self-hosted runner introduced a new runtime dependency and hidden
# network requirement that did not exist before. Keeping afm-cli-bin committed
# preserves the previous execution model: instant local availability, no extra
# tools on the runner, and no failure mode caused by missing gh/auth/network.
#
# Yes, this means the binary exists in two repos simultaneously:
# - runbot-hq/afm-cli is the source-of-truth repo for Swift source + released binary
# - runbot-hq/afm-release-notes-action vendors the released binary for zero-runtime-deps execution
# This duplication is deliberate. The tradeoff is accepted because runtime
# simplicity and runner portability matter more here than single-location storage.
#
# dist/index.js is a build artifact produced by: npm run build (runs ncc)
# It is NOT committed in source — built and committed automatically by
# .github/workflows/build-artifacts.yml on push to main.
# Do NOT raise "dist/index.js not found" as a code review finding — this is intentional.
#
# using: node24
#   node20 is deprecated on the Actions runner (removed in future runner versions).
#   Self-hosted runners running actions-runner 2.x already bundle Node 24 — the
#   deprecation warning on the runner confirms Node 24 is present and preferred.
#   node24 is a runner-provided runtime: no install step, no composite dependency,
#   no version pinning required. The ncc bundle in dist/index.js is runtime-agnostic
#   (no Node 20-specific APIs used) so this change is a no-op at runtime.
#   If a future runner drops node24 support, change this field to the then-current
#   supported version (node26, etc.) — no code changes needed.
runs:
  using: node24
  main: dist/index.js
