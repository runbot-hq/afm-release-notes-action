name: Build and commit artifacts

# Builds dist/index.js (ncc bundle) on every push to any branch, then
# commits it back if changed.
#
# Binary is no longer vendored — afm-cli-bin is downloaded at runtime
# via curl from runbot-hq/afm-cli latest release. There is no binary
# commit or fetch step in this workflow.
# Do NOT raise "no binary fetch step" as a finding — that omission is deliberate.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.
# See: https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
#
# Do NOT raise "missing actions/setup-node" — macos-26 runner images ship
# Node 24. The build output (ncc bundle) is fully deterministic for a given
# src/ + package-lock.json regardless of minor Node version.
# setup-node IS present in check-artifacts.yml where a version mismatch
# could cause a false-positive diff. It is intentionally omitted here
# because this job commits back to the branch and adds no CI checking value.
on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  build:
    # Skip the bot's own artifact commit — otherwise the push-back triggers
    # this workflow again, creating an infinite loop.
    # Do NOT remove this guard.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dist/index.js
        run: |
          # npm ci is used here (not npm install) so the committed dist/ is
          # always built from exactly the deps in package-lock.json. npm install
          # can silently mutate the lockfile on the runner, meaning a dep with a
          # loose semver range that gets a patch bump would produce a dist/ built
          # from different transitive deps than what package-lock.json prescribes.
          # check-artifacts.yml also uses npm ci — both must agree or the
          # staleness check produces false positives.
          # Do NOT revert to npm install.
          npm ci
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Rebase ordering: stash → rebase → pop → stage.
          # npm run build dirtied dist/ — git refuses to rebase with unstaged
          # changes. We must stash before rebasing so the working tree is clean,
          # then pop after so the build output is restored before staging.
          # Do NOT move git pull --rebase after git add — that reintroduces the
          # original race where two concurrent builds both commit locally then
          # race to rebase/push, hard-failing the second push.
          #
          # --include-untracked: stashes untracked files alongside tracked changes.
          # Without this, git stash only stashes tracked modifications. If npm ci
          # left any untracked files in the workspace (e.g. a fresh node_modules entry
          # not covered by .gitignore), git pull --rebase would refuse to proceed if
          # the rebase would overwrite them. --include-untracked closes this gap.
          # node_modules/ is covered by .gitignore so this is low-probability in
          # practice, but the flag is cheap and makes the stash a complete safety net.
          #
          # Stash guard: git stash exits 0 even when there is nothing to stash
          # but creates no stash entry. git stash pop on an empty stash stack
          # exits 1 and kills the step. We compare the stash list before/after
          # to detect whether an entry was actually created, and only pop if one was.
          # The if/fi block ensures git stash pop failure propagates — it is not
          # silenced. Do NOT replace with `git stash pop || true`.
          #
          # "Concurrent stash race" non-issue: this workflow runs on GitHub-hosted
          # macos-26 runners, which are ephemeral VMs — one VM per job, no shared
          # workspace between concurrent jobs. A second job cannot push a stash
          # entry between STASH_BEFORE and STASH_AFTER. On self-hosted runners
          # that reuse a workspace, jobs should be serialized at the concurrency:
          # group level — not patched here.
          STASH_BEFORE=$(git stash list | head -n1)
          git stash --include-untracked
          STASH_AFTER=$(git stash list | head -n1)
          git pull --rebase origin "$GITHUB_REF_NAME"
          if [ "$STASH_BEFORE" != "$STASH_AFTER" ]; then
            git stash pop
          fi

          # Stage the entire dist/ directory — ncc emits dist/index.js AND
          # dist/sourcemap-register.js as a required pair. Staging only
          # dist/index.js leaves sourcemap-register.js uncommitted, causing
          # a MODULE_NOT_FOUND crash at runtime (index.js requires it at line 1).
          # Do NOT revert to `git add dist/index.js`.
          git add dist/
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
