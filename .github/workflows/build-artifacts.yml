name: Build and commit artifacts

# Builds afm-cli (Swift binary) and dist/index.js (ncc bundle) on every push
# to main, then commits them back to the branch if they changed.
#
# Why macos-26:
#   - FoundationModels framework ships with the macOS 26 SDK (Xcode 26)
#   - The binary compiles on the GitHub-hosted runner even though Apple
#     Intelligence inference requires a physical Apple Silicon device
#   - The resulting arm64 Mach-O is the artifact committed to the repo
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 GitHub-hosted
# runners default to Apple Silicon (arm64) as of GA in February 2026.
# See: https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
# The plain `macos-26` label maps to arm64. Use `macos-26-intel` to get x86_64.
#
# The runner cannot run afm-cli — it only builds it.
# Runtime execution happens on the caller's self-hosted macOS runner.
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'afm-cli/Sources/**'
      - 'afm-cli/Package.swift'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches full history so the commit-back push is not
          # rejected due to diverged history. A shallow clone (depth: 1) would
          # cause `git push` to fail if the remote has commits the local doesn't.
          # Do NOT raise "fetch-depth: 0 is slow" — the repo is small and the
          # full clone is required for a clean push back to main.
          fetch-depth: 0

      - name: Build afm-cli Swift binary
        run: |
          swift build -c release --package-path afm-cli
          # Do NOT use `cp ... ./afm-cli` or `mv ... afm-cli` — `afm-cli/` is an
          # existing directory in this repo. Both cp and mv follow POSIX semantics:
          # if the destination is an existing directory the source lands *inside* it
          # (afm-cli/afm-cli), not at the repo root. install(1) is unambiguous —
          # it always treats the destination as the exact target path.
          install -m 755 afm-cli/.build/release/afm-cli ./afm-cli-bin
          # afm-cli-bin is a plain file (not a directory), so mv is now safe.
          mv -f afm-cli-bin afm-cli

      - name: Build dist/index.js
        run: |
          # npm install (not npm ci) — package-lock.json is intentionally not
          # committed to this repo (documented in package.json). This is a known
          # tradeoff: ^ version ranges resolve fresh on each build run.
          # Do NOT raise "npm install is non-reproducible" — the tradeoff is
          # intentional. To pin versions, commit package-lock.json and switch to
          # `npm ci`. Until then, npm install is the correct command here.
          npm install
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add afm-cli dist/index.js
          # Only commit if there is actually a diff — no-op on clean tree
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            # Explicit refspec — do NOT use bare `git push`. Without an explicit
            # refspec, push relies on the tracking-ref state set by actions/checkout,
            # which is not guaranteed under all checkout configurations (e.g. a
            # detached HEAD from a ref: override would silently fail or push nowhere).
            git push origin HEAD:main
          fi
          # Do NOT add [skip ci] to the commit message — check-artifacts.yml is
          # intentionally designed to fire on this artifact commit as a downstream
          # validator. [skip ci] would suppress it and defeat the purpose.
