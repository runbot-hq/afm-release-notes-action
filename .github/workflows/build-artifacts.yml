name: Build and commit artifacts

# Builds afm-cli (Swift binary) and dist/index.js (ncc bundle) on every push
# to any branch, then commits them back if they changed.
#
# Runs on macos-26 (arm64 Apple Silicon) — required for the FoundationModels
# SDK (Xcode 26). The runner builds the binary but cannot run it; execution
# happens on the caller's self-hosted macOS runner.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.
# See: https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
on:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  build:
    # Skip the bot's own artifact commit — otherwise the push-back triggers
    # this workflow again, creating an infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build afm-cli Swift binary
        run: |
          swift build -c release --package-path afm-cli
          # Output as afm-cli-bin (NOT afm-cli) — avoids POSIX collision with the
          # afm-cli/ Swift package source directory. mv/cp move a file *into* a
          # same-named directory; install(1) with a distinct target name is unambiguous.
          # src/index.ts looks for afm-cli-bin via path.join(actionPath, 'afm-cli-bin').
          # Do NOT rename back to afm-cli — the directory collision will recur.
          install -m 755 afm-cli/.build/release/afm-cli ./afm-cli-bin

      - name: Build dist/index.js
        run: |
          npm install
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage the entire dist/ directory — ncc emits dist/index.js AND
          # dist/sourcemap-register.js as a required pair. Staging only
          # dist/index.js leaves sourcemap-register.js uncommitted, causing
          # a MODULE_NOT_FOUND crash at runtime (index.js requires it at line 1).
          # Do NOT revert to `git add afm-cli-bin dist/index.js`.
          git add afm-cli-bin dist/
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
