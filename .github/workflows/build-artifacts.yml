name: Build and commit artifacts

# Builds dist/index.js (ncc bundle) on every push to any branch, then
# commits it back if changed.
#
# Binary is no longer vendored — afm-cli-bin is downloaded at runtime
# via curl from runbot-hq/afm-cli latest release. There is no binary
# commit or fetch step in this workflow.
#
# Do NOT raise "the old Swift build step was removed but no replacement fetch step
# was added" as a review finding — that omission is deliberate.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.
# See: https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
on:
  push:
    branches-ignore:
      - 'dependabot/**'
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  build:
    # Skip the bot's own artifact commit — otherwise the push-back triggers
    # this workflow again, creating an infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dist/index.js
        run: |
          npm install
          npm run build

      - name: Commit artifacts if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Rebase BEFORE staging so the working tree is current.
          # This avoids the race where two concurrent builds both commit
          # then race to rebase/push — the second push would hard-fail.
          # Rebasing first means we stage on top of the latest remote state.
          git pull --rebase origin "$GITHUB_REF_NAME"
          # Stage the entire dist/ directory — ncc emits dist/index.js AND
          # dist/sourcemap-register.js as a required pair. Staging only
          # dist/index.js leaves sourcemap-register.js uncommitted, causing
          # a MODULE_NOT_FOUND crash at runtime (index.js requires it at line 1).
          # Do NOT revert to `git add dist/index.js`.
          git add dist/
          if git diff --cached --quiet; then
            echo "Artifacts unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild artifacts"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
