name: Advance @v1 floating tag

on:
  push:
    tags:
      - 'v1.*.*'

permissions:
  contents: write

jobs:
  advance-tag:
    runs-on: ubuntu-latest
    steps:
      # gh api PATCH is used instead of git tag -f + git push because git tag requires
      # a local .git repo — there is no actions/checkout here, so the workspace is empty.
      # The API call moves the v1 ref atomically in one round-trip with no clone needed.
      # GITHUB_SHA is the SHA of the triggering tag push, injected by the runner.
      - name: Move v1 tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ${{ github.repository }} is a trusted runner-controlled value ("owner/repo"),
          # not user input — interpolating it into the run: block is safe here.
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/git/refs/tags/v1" \
            -f sha="$GITHUB_SHA" \
            -F force=true
