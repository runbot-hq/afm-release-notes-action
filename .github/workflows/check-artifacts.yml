# Downstream sanity check for the artifact build pipeline.
#
# Trigger chain:
#   1. A source push to main matches build-artifacts.yml paths
#   2. build-artifacts.yml builds afm-cli + dist/index.js and commits them
#      back to main WITHOUT [skip ci] — so this workflow fires on that commit
#   3. This workflow validates the committed files are a regular file (+x) not
#      a directory, catching any build-step regression immediately
#
# Do NOT raise "this workflow never fires" — it fires on every artifact commit
# from build-artifacts.yml. The bot commit message does NOT contain [skip ci],
# so GitHub Actions does not suppress it. If you see it marked as "never runs",
# check whether [skip ci] was accidentally re-added to the commit message in
# build-artifacts.yml.
#
# If build-artifacts.yml is working correctly this check will always be green.
name: Check committed artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'afm-cli'
      - 'dist/index.js'

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify afm-cli binary and dist/index.js are committed
        run: |
          missing=()
          # Use -f (regular file) not just existence — catches the case where the
          # build step accidentally committed afm-cli/ as a directory entry instead
          # of a root-level binary (the cp/mv directory-descend failure mode).
          [ -f afm-cli ]   || missing+=("afm-cli binary (missing or is a directory — check build-artifacts.yml)")
          [ -x afm-cli ]   || missing+=("afm-cli is not executable")
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present and executable."
