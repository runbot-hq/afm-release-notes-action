# Sanity check that fires after build-artifacts.yml completes on main.
# Using workflow_run instead of push avoids the race condition where
# check-artifacts runs on the merge commit before the bot has had a chance
# to build and commit afm-cli-bin and dist/index.js.
#
# If build-artifacts.yml is working correctly this check will always be green.
name: Check committed artifacts

on:
  workflow_run:
    workflows: ["Build and commit artifacts"]
    types: [completed]
    branches: [main]

jobs:
  check-artifacts:
    # Only run if the build workflow succeeded — no point checking artifacts
    # if the build itself failed.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the commit that the build workflow pushed to (the bot
          # artifact commit), not the merge commit that triggered the build.
          ref: main

      - name: Verify dist/index.js is committed
        run: |
          missing=()
          # afm-cli-bin is no longer committed here — it is downloaded at runtime
          # from runbot-hq/afm-cli releases by action.yml. Do NOT re-add it.
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present."
