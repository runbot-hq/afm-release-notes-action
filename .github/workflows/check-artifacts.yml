name: Check committed artifacts

# This workflow fires on push to main only — not on pull_request or feature branches.
# Artifacts (afm-cli binary + dist/index.js) require a self-hosted macOS runner
# build step that cannot happen in CI before merge. The check catches a bad merge
# immediately after it lands on main. Do NOT move this to pull_request trigger —
# the artifacts will never be present on a feature branch before the local build.
on:
  push:
    branches:
      - main
    paths:
      # Only run when files that could affect artifact validity change.
      # Docs/config-only pushes to main skip this job to save runner minutes.
      #
      # Path entry breakdown:
      #   'afm-cli'              — the compiled binary at the repo root (exact file,
      #                            NOT the afm-cli/ directory — directory changes are
      #                            covered by the afm-cli/Sources/** and Package.swift
      #                            entries below)
      #   'dist/**'              — the bundled JS artifact
      #   'src/**'               — TS source changes that require a dist rebuild
      #   'afm-cli/Sources/**'   — Swift source changes that require a binary rebuild
      #   'afm-cli/Package.swift'— Swift package manifest changes
      - 'afm-cli'
      - 'dist/**'
      - 'src/**'
      - 'afm-cli/Sources/**'
      - 'afm-cli/Package.swift'

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify afm-cli binary and dist/index.js are committed
        run: |
          missing=()
          [ -f afm-cli ]                      || missing+=("afm-cli binary")
          # -x gated on -f: if binary is absent, skip the exec-bit check to avoid
          # two misleading entries ("afm-cli binary" AND "afm-cli is not executable").
          [ ! -f afm-cli ] || [ -x afm-cli ] || missing+=("afm-cli is not executable (chmod +x afm-cli)")
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            echo "Run on the self-hosted macOS runner, then commit:"
            echo "  swift build -c release && cp .build/release/afm-cli ."
            echo "  npm run build"
            echo "  git add afm-cli dist/index.js && git commit -m 'chore: build artifacts'"
            exit 1
          fi
          echo "All required artifacts present and executable."
