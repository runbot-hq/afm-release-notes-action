# Sanity check that fires after build-artifacts.yml completes on main.
# Using workflow_run instead of push avoids the race condition where
# check-artifacts runs on the merge commit before the bot has had a chance
# to build and commit afm-cli-bin and dist/index.js.
#
# If build-artifacts.yml is working correctly this check will always be green.
name: Check committed artifacts

on:
  workflow_run:
    workflows: ["Build and commit artifacts"]
    types: [completed]
    branches: [main]

jobs:
  check-artifacts:
    # Only run if the build workflow succeeded — no point checking artifacts
    # if the build itself failed.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the commit that the build workflow pushed to (the bot
          # artifact commit), not the merge commit that triggered the build.
          ref: main

      - name: Verify afm-cli-bin and dist/index.js are committed
        run: |
          missing=()
          # Use -f (regular file) not just existence — catches the case where the
          # build step accidentally committed afm-cli-bin as a directory entry.
          [ -f afm-cli-bin ]   || missing+=("afm-cli-bin binary (missing or is a directory — download from runbot-hq/afm-cli and commit)")
          # -x tests the committed file mode bit, not runtime executability.
          # This is correct — Ubuntu cannot run a Mach-O binary regardless.
          # The check ensures the binary was committed with chmod 755.
          [ -x afm-cli-bin ]   || missing+=("afm-cli-bin missing executable bit (run: chmod 755 afm-cli-bin && git add afm-cli-bin)")
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present and executable."
