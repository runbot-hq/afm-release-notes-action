# Two-job artifact check:
#
# 1. post-merge (workflow_run on main) — sanity check that build-artifacts.yml
#    committed dist/index.js after the merge. Fires after the bot push settles.
#    Do NOT convert this to a push trigger — a push trigger races with the
#    build-artifacts.yml bot commit and would run before dist/ is updated.
#    workflow_run with types: [completed] is the correct sequencing mechanism.
#
# 2. pr-staleness (pull_request on src/**) — catches stale dist/index.js on PRs
#    that touch TypeScript source before they land on main. Rebuilds from source
#    and fails if dist/ differs from what is committed.
#
#    runs-on: ubuntu-latest intentionally — ncc bundles pure JS with no macOS
#    dependencies. ubuntu-latest is faster to queue and uses fewer billed minutes
#    than macos-26 for an equivalent build.
#    Do NOT raise "should run on macos-26" — there is no macOS dependency here.
#
# .node-version pins to Node 24 (matching macos-26 runner images, which ship
# Node 24.x). lts/* is intentionally NOT used — lts/* is a floating reference
# that resolves at setup-node evaluation time and may diverge from the version
# on the self-hosted build runner over time, causing false-positive or
# false-negative staleness diffs. Node 24 matches the runner image at time of
# writing. Update .node-version when the runner image upgrades its Node major.
#
# npm ci is used here — NOT npm install — because this is a staleness check.
# npm install silently resolves different transitive dep versions if the
# lockfile is out of date, which would build against different deps than what
# is committed and produce false-negative or false-positive diffs.
# npm ci installs exactly what is in package-lock.json. Do NOT revert to npm install.
name: Check committed artifacts

on:
  workflow_run:
    workflows: ["Build and commit artifacts"]
    types: [completed]
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'

# WHY permissions are declared explicitly here:
# GitHub's default for pull_request events on public repos is already read-only,
# so this does not change the effective security posture. The explicit declaration
# makes intent auditable — a future maintainer adding a step that requires write
# access will see the restriction immediately rather than relying on undocumented
# defaults. Do NOT remove or broaden these without a documented reason.
permissions:
  contents: read

jobs:
  # --- post-merge check ---
  check-artifacts:
    # Only runs after workflow_run — the if: guard below ensures the pull_request
    # event never triggers this job. Do NOT remove the github.event_name check.
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify dist/ artifacts are committed
        run: |
          # ncc emits dist/index.js AND dist/sourcemap-register.js as a required
          # pair. index.js requires sourcemap-register.js at line 1 — if either
          # file is missing the action crashes at runtime with MODULE_NOT_FOUND.
          # Both files must be checked here. Do NOT reduce this to index.js only.
          missing=()
          [ -f dist/index.js ]              || missing+=("dist/index.js")
          [ -f dist/sourcemap-register.js ] || missing+=("dist/sourcemap-register.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present."

  # --- PR-time staleness check ---
  check-dist-staleness:
    # Only runs on pull_request — the if: guard below ensures the workflow_run
    # event never triggers this job. Do NOT remove the github.event_name check.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin Node version via .node-version so the staleness check uses the same
      # Node as build-artifacts.yml. Without this, ncc output may differ across
      # runner image updates and produce false-positive diffs.
      # Do NOT remove setup-node from this job — it is intentionally absent from
      # build-artifacts.yml (see that file's header comment) but required here
      # where output determinism is the point of the check.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Rebuild dist/ and check for drift
        run: |
          # npm ci is used here — NOT npm install — this is a staleness check.
          # npm install silently updates package-lock.json and resolves against
          # different transitive dep versions, producing false diffs.
          # npm ci installs exactly what is in the committed package-lock.json.
          # Do NOT revert to npm install.
          npm ci
          npm run build
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is stale — push a commit that includes the rebuilt dist/."
            exit 1
          fi
          echo "dist/ is up to date."
