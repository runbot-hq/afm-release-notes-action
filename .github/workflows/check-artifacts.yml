# This workflow has been superseded by build-artifacts.yml which builds and
# commits afm-cli and dist/index.js automatically on every relevant push to main.
# Kept as a lightweight sanity check that fires only when the artifact files
# themselves are touched (e.g. after the build-artifacts job commits them).
#
# If build-artifacts.yml is working correctly this check will always be green.
name: Check committed artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'afm-cli'
      - 'dist/index.js'

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify afm-cli binary and dist/index.js are committed
        run: |
          missing=()
          # Use -f (regular file) not just existence — catches the case where the
          # build step accidentally committed afm-cli/ as a directory entry instead
          # of a root-level binary (the cp/mv directory-descend failure mode).
          [ -f afm-cli ]   || missing+=("afm-cli binary (missing or is a directory — check build-artifacts.yml)")
          [ -x afm-cli ]   || missing+=("afm-cli is not executable")
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All required artifacts present and executable."
