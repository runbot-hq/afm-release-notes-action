name: Check committed artifacts

on:
  push:
    branches:
      - main

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify afm-cli binary and dist/index.js are committed
        run: |
          missing=()
          [ -f afm-cli ]                      || missing+=("afm-cli binary")
          [ ! -f afm-cli ] || [ -x afm-cli ] || missing+=("afm-cli is not executable (chmod +x afm-cli)")
          [ -f dist/index.js ] || missing+=("dist/index.js")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing committed artifacts: ${missing[*]}"
            echo "Run on the self-hosted macOS runner, then commit:"
            echo "  swift build -c release && cp .build/release/afm-cli ."
            echo "  npm run build"
            echo "  git add afm-cli dist/index.js && git commit -m 'chore: build artifacts'"
            exit 1
          fi
          echo "All required artifacts present and executable."
